<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Nike Chat - वीडियो कॉल & मैसेजिंग</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .app-container {
            width: 95%;
            max-width: 1400px;
            height: 90vh;
            background: rgba(255,255,255,0.95);
            border-radius: 30px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            display: flex;
            overflow: hidden;
        }

        /* Sidebar */
        .sidebar {
            width: 280px;
            background: #1a1c23;
            color: white;
            display: flex;
            flex-direction: column;
        }

        .sidebar-header {
            padding: 20px;
            background: #0f1117;
            border-bottom: 1px solid #2a2d37;
        }

        .sidebar-header h2 {
            font-size: 1.3rem;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .online-count {
            font-size: 0.8rem;
            background: #10b981;
            padding: 2px 8px;
            border-radius: 20px;
            margin-left: 10px;
        }

        .user-list {
            flex: 1;
            overflow-y: auto;
            padding: 10px;
        }

        .user-item {
            padding: 12px 15px;
            margin: 5px 0;
            background: #2a2d37;
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .user-item:hover {
            background: #3a3e4a;
            transform: translateX(5px);
        }

        .user-item.active {
            background: #667eea;
            box-shadow: 0 2px 10px rgba(102,126,234,0.4);
        }

        .user-status {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            background: #10b981;
        }

        /* Main Chat */
        .main-chat {
            flex: 1;
            display: flex;
            flex-direction: column;
            background: #f8f9fc;
        }

        .chat-header {
            padding: 20px;
            background: white;
            border-bottom: 1px solid #e5e7eb;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 10px;
        }

        .current-user-info {
            display: flex;
            align-items: center;
            gap: 10px;
            font-weight: bold;
        }

        .call-buttons {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }

        .call-btn {
            border: none;
            color: white;
            padding: 8px 16px;
            border-radius: 30px;
            cursor: pointer;
            font-weight: bold;
            transition: all 0.2s;
        }

        .call-btn.voice {
            background: #f59e0b;
        }

        .call-btn.video {
            background: #10b981;
        }

        .call-btn.end {
            background: #ef4444;
        }

        .call-btn:hover {
            transform: scale(1.02);
            filter: brightness(1.05);
        }

        .messages-area {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .message {
            max-width: 70%;
            padding: 10px 15px;
            border-radius: 18px;
            animation: fadeIn 0.2s;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .message.sent {
            background: #667eea;
            color: white;
            align-self: flex-end;
            border-bottom-right-radius: 5px;
        }

        .message.received {
            background: white;
            color: #1f2937;
            border: 1px solid #e5e7eb;
            align-self: flex-start;
            border-bottom-left-radius: 5px;
        }

        .message-name {
            font-size: 0.7rem;
            font-weight: bold;
            margin-bottom: 4px;
            opacity: 0.8;
        }

        .message-text {
            font-size: 0.95rem;
            word-wrap: break-word;
        }

        .message-time {
            font-size: 0.65rem;
            text-align: right;
            margin-top: 4px;
            opacity: 0.7;
        }

        .input-area {
            padding: 20px;
            background: white;
            border-top: 1px solid #e5e7eb;
            display: flex;
            gap: 10px;
        }

        .input-area input {
            flex: 1;
            padding: 12px 18px;
            border: 2px solid #e5e7eb;
            border-radius: 30px;
            font-size: 1rem;
            outline: none;
        }

        .input-area input:focus {
            border-color: #667eea;
        }

        .input-area button {
            background: #667eea;
            color: white;
            border: none;
            padding: 12px 25px;
            border-radius: 30px;
            cursor: pointer;
            font-weight: bold;
        }

        .video-modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.95);
            z-index: 1000;
            justify-content: center;
            align-items: center;
            flex-direction: column;
        }

        .video-container {
            display: flex;
            gap: 20px;
            flex-wrap: wrap;
            justify-content: center;
            align-items: center;
        }

        .video-box {
            background: #000;
            border-radius: 20px;
            overflow: hidden;
            width: 400px;
            max-width: 90%;
            position: relative;
        }

        .video-box video {
            width: 100%;
            height: auto;
            background: #000;
        }

        .video-box label {
            position: absolute;
            bottom: 10px;
            left: 10px;
            background: rgba(0,0,0,0.6);
            color: white;
            padding: 5px 10px;
            border-radius: 20px;
            font-size: 0.8rem;
        }

        .login-screen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(135deg, #667eea, #764ba2);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 2000;
        }

        .login-card {
            background: white;
            padding: 40px;
            border-radius: 30px;
            text-align: center;
            width: 350px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.2);
        }

        .login-card h1 {
            color: #667eea;
            margin-bottom: 10px;
        }

        .login-card input {
            width: 100%;
            padding: 12px;
            margin: 15px 0;
            border: 2px solid #e5e7eb;
            border-radius: 30px;
            font-size: 1rem;
        }

        .login-card button {
            background: #667eea;
            color: white;
            border: none;
            padding: 12px 30px;
            border-radius: 30px;
            font-weight: bold;
            cursor: pointer;
            width: 100%;
        }

        @media (max-width: 768px) {
            .sidebar { width: 80px; }
            .sidebar-header h2 span, .user-item span:last-child { display: none; }
            .user-item { justify-content: center; }
            .message { max-width: 85%; }
        }

        .notification {
            position: fixed;
            bottom: 20px;
            right: 20px;
            background: #333;
            color: white;
            padding: 10px 20px;
            border-radius: 10px;
            z-index: 1000;
            animation: slideIn 0.3s;
        }

        @keyframes slideIn {
            from { transform: translateX(100%); opacity: 0; }
            to { transform: translateX(0); opacity: 1; }
        }
    </style>
</head>
<body>

<div class="login-screen" id="loginScreen">
    <div class="login-card">
        <h1>🏃‍♂️ Nike Chat</h1>
        <p>बिना लॉगिन, तुरंत जुड़ें</p>
        <input type="text" id="usernameInput" placeholder="अपना निकनेम लिखें" maxlength="20" value="Nike">
        <button onclick="joinChat()">✨ चैट में जाएं ✨</button>
    </div>
</div>

<div class="app-container" id="appContainer" style="display: none;">
    <div class="sidebar">
        <div class="sidebar-header">
            <h2>👥 ऑनलाइन <span class="online-count" id="onlineCount">0</span></h2>
        </div>
        <div class="user-list" id="userList">
            <div style="text-align: center; padding: 20px;">लोड हो रहा...</div>
        </div>
    </div>
    <div class="main-chat">
        <div class="chat-header">
            <div class="current-user-info">
                <div>💬 <span id="currentChatUser">सभी से बात करें</span></div>
            </div>
            <div class="call-buttons">
                <button class="call-btn voice" onclick="startVoiceCall()">🎤 वॉइस कॉल</button>
                <button class="call-btn video" onclick="startVideoCall()">📹 वीडियो कॉल</button>
                <button class="call-btn end" id="endCallBtn" style="display: none;" onclick="endCall()">📞 एंड कॉल</button>
            </div>
        </div>
        <div class="messages-area" id="messagesArea">
            <div style="text-align: center; color: #888;">👋 नमस्ते! अपना पहला मैसेज भेजें</div>
        </div>
        <div class="input-area">
            <input type="text" id="messageInput" placeholder="मैसेज टाइप करें..." onkeypress="if(event.key==='Enter') sendMessage()">
            <button onclick="sendMessage()">📤 भेजें</button>
        </div>
    </div>
</div>

<div class="video-modal" id="videoModal">
    <div class="video-container" id="videoContainer"></div>
    <button onclick="endCall()" style="margin-top: 20px; background: #ef4444; color: white; border: none; padding: 12px 30px; border-radius: 30px; cursor: pointer;">🔴 कॉल एंड करें</button>
</div>

<script>
    // ==================== WebRTC Setup ====================
    let localStream = null;
    let peerConnection = null;
    let currentCallType = null;
    let targetUserId = null;
    let currentUsername = "Nike";
    let activeCall = false;
    let onlineUsers = ["Nike", "Rahul", "Priya", "Amit", "Simran"];

    // Simple signaling using BroadcastChannel
    const signalingChannel = new BroadcastChannel('webrtc_signal');
    
    signalingChannel.onmessage = async (event) => {
        const { type, from, to, sdp, candidate, callType } = event.data;
        if(to !== currentUsername && to !== "all") return;
        
        if(type === 'offer') {
            await handleOffer(from, sdp, callType);
        } else if(type === 'answer') {
            await handleAnswer(sdp);
        } else if(type === 'ice-candidate') {
            if(peerConnection && candidate) {
                try {
                    await peerConnection.addIceCandidate(new RTCIceCandidate(candidate));
                } catch(e) { console.log("ICE error:", e); }
            }
        } else if(type === 'end-call') {
            endCall();
        }
    };
    
    async function handleOffer(from, sdp, callType) {
        if(activeCall) {
            showNotification("आप पहले से कॉल में हैं!");
            return;
        }
        targetUserId = from;
        currentCallType = callType;
        activeCall = true;
        
        try {
            await setupLocalStream(callType === 'video');
            peerConnection = createPeerConnection();
            await peerConnection.setRemoteDescription(new RTCSessionDescription({ type: 'offer', sdp }));
            const answer = await peerConnection.createAnswer();
            await peerConnection.setLocalDescription(answer);
            
            signalingChannel.postMessage({
                type: 'answer',
                from: currentUsername,
                to: targetUserId,
                sdp: answer.sdp
            });
            
            showCallUI(true, callType === 'video');
            showNotification(`${from} से ${callType === 'video' ? 'वीडियो' : 'वॉइस'} कॉल आ रही है...`);
        } catch(e) {
            console.error("Offer handling error:", e);
            showNotification("कॉल कनेक्ट नहीं हो पाई!");
            endCall();
        }
    }
    
    async function handleAnswer(sdp) {
        if(peerConnection) {
            await peerConnection.setRemoteDescription(new RTCSessionDescription({ type: 'answer', sdp }));
            showNotification("कॉल कनेक्ट हो गई!");
        }
    }
    
    async function startVoiceCall() {
        if(!targetUserId || targetUserId === currentUsername) {
            showNotification("पहले किसी यूजर को सेलेक्ट करें!");
            return;
        }
        if(activeCall) { showNotification("कॉल पहले से चल रही है"); return; }
        
        currentCallType = 'voice';
        activeCall = true;
        
        try {
            await setupLocalStream(false);
            peerConnection = createPeerConnection();
            const offer = await peerConnection.createOffer();
            await peerConnection.setLocalDescription(offer);
            
            signalingChannel.postMessage({
                type: 'offer',
                from: currentUsername,
                to: targetUserId,
                sdp: offer.sdp,
                callType: 'voice'
            });
            showCallUI(true, false);
            showNotification(`${targetUserId} को कॉल कर रहे हैं...`);
        } catch(e) {
            console.error("Voice call error:", e);
            showNotification("माइक्रोफोन एक्सेस नहीं हो पाया!");
            endCall();
        }
    }
    
    async function startVideoCall() {
        if(!targetUserId || targetUserId === currentUsername) {
            showNotification("पहले किसी यूजर को सेलेक्ट करें!");
            return;
        }
        if(activeCall) { showNotification("कॉल पहले से चल रही है"); return; }
        
        currentCallType = 'video';
        activeCall = true;
        
        try {
            await setupLocalStream(true);
            peerConnection = createPeerConnection();
            const offer = await peerConnection.createOffer();
            await peerConnection.setLocalDescription(offer);
            
            signalingChannel.postMessage({
                type: 'offer',
                from: currentUsername,
                to: targetUserId,
                sdp: offer.sdp,
                callType: 'video'
            });
            showCallUI(true, true);
            showNotification(`${targetUserId} को वीडियो कॉल कर रहे हैं...`);
        } catch(e) {
            console.error("Video call error:", e);
            showNotification("कैमरा/माइक एक्सेस नहीं हो पाया!");
            endCall();
        }
    }
    
    async function setupLocalStream(isVideo) {
        if(localStream) {
            localStream.getTracks().forEach(track => track.stop());
        }
        const constraints = { audio: true, video: isVideo };
        localStream = await navigator.mediaDevices.getUserMedia(constraints);
    }
    
    function createPeerConnection() {
        const pc = new RTCPeerConnection({
            iceServers: [
                { urls: 'stun:stun.l.google.com:19302' },
                { urls: 'stun:stun1.l.google.com:19302' }
            ]
        });
        
        if(localStream) {
            localStream.getTracks().forEach(track => pc.addTrack(track, localStream));
        }
        
        pc.onicecandidate = (event) => {
            if(event.candidate) {
                signalingChannel.postMessage({
                    type: 'ice-candidate',
                    from: currentUsername,
                    to: targetUserId,
                    candidate: event.candidate
                });
            }
        };
        
        pc.ontrack = (event) => {
            const remoteVideo = document.getElementById('remoteVideo');
            if(remoteVideo && event.streams[0]) {
                remoteVideo.srcObject = event.streams[0];
            }
        };
        
        return pc;
    }
    
    function endCall() {
        if(peerConnection) {
            peerConnection.close();
            peerConnection = null;
        }
        if(localStream) {
            localStream.getTracks().forEach(track => track.stop());
            localStream = null;
        }
        
        if(activeCall && targetUserId) {
            signalingChannel.postMessage({
                type: 'end-call',
                from: currentUsername,
                to: targetUserId
            });
        }
        
        activeCall = false;
        currentCallType = null;
        targetUserId = null;
        showCallUI(false, false);
        document.getElementById('videoModal').style.display = 'none';
        showNotification("कॉल समाप्त हो गई");
    }
    
    function showCallUI(inCall, isVideo) {
        const endBtn = document.getElementById('endCallBtn');
        if(endBtn) endBtn.style.display = inCall ? 'inline-block' : 'none';
        
        if(inCall && isVideo) {
            document.getElementById('videoModal').style.display = 'flex';
            const container = document.getElementById('videoContainer');
            container.innerHTML = `
                <div class="video-box">
                    <video id="localVideo" autoplay muted playsinline></video>
                    <label>आप (${currentUsername})</label>
                </div>
                <div class="video-box">
                    <video id="remoteVideo" autoplay playsinline></video>
                    <label>${targetUserId || 'दूसरा यूजर'}</label>
                </div>
            `;
            if(localStream) {
                const localVideo = document.getElementById('localVideo');
                if(localVideo) localVideo.srcObject = localStream;
            }
        }
    }
    
    // ========== Chat & Users Management ==========
    function joinChat() {
        let name = document.getElementById('usernameInput').value.trim();
        if(!name) {
            showNotification("कृपया नाम लिखें!");
            return;
        }
        currentUsername = name;
        document.getElementById('loginScreen').style.display = 'none';
        document.getElementById('appContainer').style.display = 'flex';
        
        loadMessagesFromStorage();
        updateUserList();
        
        // Broadcast that user joined
        const joinMsg = {
            text: `${currentUsername} चैट में जुड़े!`,
            from: "System",
            time: new Date().toLocaleTimeString(),
            type: 'system'
        };
        saveMessageToStorage(joinMsg);
        displayMessage(joinMsg, false);
        
        // Refresh user list every 3 seconds
        setInterval(() => updateUserList(), 3000);
    }
    
    function updateUserList() {
        // Demo online users list
        const allUsers = [currentUsername, ...onlineUsers.filter(u => u !== currentUsername)];
        const uniqueUsers = [...new Set(allUsers)];
        
        const userDiv = document.getElementById('userList');
        if(!userDiv) return;
        
        userDiv.innerHTML = uniqueUsers.map(u => `
            <div class="user-item ${targetUserId === u ? 'active' : ''}" onclick="selectUser('${u}')">
                <div class="user-status"></div>
                <span>${u}</span>
            </div>
        `).join('');
        
        const countSpan = document.getElementById('onlineCount');
        if(countSpan) countSpan.innerText = uniqueUsers.length;
    }
    
    function selectUser(user) {
        if(user === currentUsername) {
            showNotification("आप खुद से बात नहीं कर सकते!");
            return;
        }
        targetUserId = user;
        const chatSpan = document.getElementById('currentChatUser');
        if(chatSpan) chatSpan.innerText = `${user} से बात करें`;
        updateUserList();
        showNotification(`${user} से बात कर रहे हैं`);
    }
    
    function sendMessage() {
        const msgInput = document.getElementById('messageInput');
        const msg = msgInput.value.trim();
        
        if(!msg) {
            showNotification("कृपया मैसेज लिखें!");
            return;
        }
        
        const messageObj = {
            text: msg,
            from: currentUsername,
            to: targetUserId || "all",
            time: new Date().toLocaleTimeString(),
            type: 'text'
        };
        
        saveMessageToStorage(messageObj);
        displayMessage(messageObj, true);
        msgInput.value = '';
        
        // Scroll to bottom
        const area = document.getElementById('messagesArea');
        if(area) area.scrollTop = area.scrollHeight;
    }
    
    function displayMessage(msg, isSent) {
        const area = document.getElementById('messagesArea');
        if(!area) return;
        
        // Remove placeholder if exists
        if(area.children.length === 1 && area.children[0].innerText.includes("नमस्ते")) {
            area.innerHTML = '';
        }
        
        const div = document.createElement('div');
        div.className = `message ${isSent ? 'sent' : 'received'}`;
        
        let nameDisplay = msg.from;
        if(msg.from === "System") nameDisplay = "📢 System";
        
        div.innerHTML = `
            <div class="message-name">${escapeHtml(nameDisplay)}</div>
            <div class="message-text">${escapeHtml(msg.text)}</div>
            <div class="message-time">${msg.time}</div>
        `;
        
        area.appendChild(div);
        area.scrollTop = area.scrollHeight;
    }
    
    function saveMessageToStorage(msg) {
        let messages = JSON.parse(localStorage.getItem('nike_chat_messages') || '[]');
        messages.push(msg);
        if(messages.length > 100) messages.shift();
        localStorage.setItem('nike_chat_messages', JSON.stringify(messages));
        
        // Broadcast to other tabs
        const bc = new BroadcastChannel('nike_chat_update');
        bc.postMessage(msg);
    }
    
    function loadMessagesFromStorage() {
        const messages = JSON.parse(localStorage.getItem('nike_chat_messages') || '[]');
        const area = document.getElementById('messagesArea');
        if(area) area.innerHTML = '';
        
        messages.forEach(msg => {
            displayMessage(msg, msg.from === currentUsername);
        });
        
        if(messages.length === 0 && area) {
            area.innerHTML = '<div style="text-align: center; color: #888;">👋 नमस्ते! अपना पहला मैसेज भेजें</div>';
        }
    }
    
    function showNotification(msg) {
        // Remove existing notification
        const oldNotif = document.querySelector('.notification');
        if(oldNotif) oldNotif.remove();
        
        const notif = document.createElement('div');
        notif.className = 'notification';
        notif.innerText = msg;
        document.body.appendChild(notif);
        
        setTimeout(() => {
            if(notif) notif.remove();
        }, 3000);
    }
    
    function escapeHtml(str) {
        if(!str) return '';
        return str.replace(/[&<>]/g, function(m) {
            if(m === '&') return '&amp;';
            if(m === '<') return '&lt;';
            if(m === '>') return '&gt;';
            return m;
        });
    }
    
    // Listen for chat updates from other tabs
    const chatChannel = new BroadcastChannel('nike_chat_update');
    chatChannel.onmessage = (e) => {
        if(e.data.from !== currentUsername) {
            displayMessage(e.data, false);
        }
    };
    
    // Check browser compatibility
    window.onload = () => {
        if(!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia) {
            showNotification("⚠️ आपका ब्राउज़र वीडियो/वॉइस कॉल सपोर्ट नहीं करता। कृपया Chrome या Edge इस्तेमाल करें।");
        }
    };
</script>
</body>
</html>
